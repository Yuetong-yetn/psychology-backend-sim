<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backend Debug Viewer</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #151b23;
        --panel-2: #1b2230;
        --line: #2a3444;
        --text: #edf2f7;
        --muted: #97a6ba;
        --accent: #f59e0b;
        --accent-2: #60a5fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(245, 158, 11, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(96, 165, 250, 0.14), transparent 24%),
          linear-gradient(180deg, #0d1117 0%, #0b0f14 100%);
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .shell {
        max-width: 1360px;
        margin: 0 auto;
        padding: 28px 20px 56px;
      }

      .hero {
        display: grid;
        gap: 18px;
        grid-template-columns: 1.35fr 0.95fr;
        margin-bottom: 20px;
      }

      .panel {
        background: linear-gradient(180deg, rgba(21, 27, 35, 0.96), rgba(17, 22, 29, 0.96));
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }

      .hero-main,
      .hero-side,
      .card {
        padding: 22px;
      }

      .hero-main h1 {
        margin: 0 0 10px;
        font-size: 38px;
      }

      .hero-main p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .eyebrow {
        margin-bottom: 10px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), #fb7185);
        color: #121212;
      }

      button.secondary {
        background: #263142;
        color: var(--text);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .links a {
        display: block;
        margin: 8px 0;
        color: #cfe4ff;
        text-decoration: none;
      }

      .progress-wrap {
        margin-top: 14px;
        padding: 14px;
        border-radius: 16px;
        background: #111722;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .progress-bar {
        width: 100%;
        height: 12px;
        overflow: hidden;
        border: 1px solid #334155;
        border-radius: 999px;
        background: #0b1118;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 0.25s ease;
      }

      .progress-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(12, minmax(0, 1fr));
      }

      .span-4 {
        grid-column: span 4;
      }

      .span-5 {
        grid-column: span 5;
      }

      .span-7 {
        grid-column: span 7;
      }

      .span-8 {
        grid-column: span 8;
      }

      .span-12 {
        grid-column: span 12;
      }

      .stat {
        font-size: 34px;
        font-weight: 800;
      }

      .sub {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .list,
      .timeline {
        display: grid;
        gap: 12px;
      }

      .agent,
      .round,
      .param-grid {
        padding: 14px;
        border-radius: 16px;
        background: var(--panel-2);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .agent strong,
      .result strong,
      .round h3 {
        display: block;
        margin-bottom: 6px;
      }

      .round h3 {
        margin-top: 0;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        margin-right: 6px;
        margin-top: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: #243044;
        color: #dce8ff;
        font-size: 12px;
        white-space: normal;
        word-break: break-word;
      }

      .result {
        margin-top: 12px;
        padding: 14px;
        border-radius: 14px;
        background: #192230;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 10px;
      }

      .meta div,
      .field {
        min-width: 0;
        padding: 10px 12px;
        border-radius: 14px;
        background: #0f1520;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      .meta div {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .field input,
      .field select {
        width: 100%;
        padding: 10px;
        border: 1px solid #334155;
        border-radius: 10px;
        background: #0b1118;
        color: var(--text);
      }

      .field.checkbox {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .field.checkbox input {
        width: auto;
      }

      .loading,
      .empty {
        padding: 36px;
        text-align: center;
        color: var(--muted);
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: Consolas, monospace;
        font-size: 12px;
        color: #d8e3f0;
      }

      @media (max-width: 980px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .span-4,
        .span-5,
        .span-7,
        .span-8,
        .span-12 {
          grid-column: span 12;
        }
      }

      @media (max-width: 720px) {
        .meta,
        .form-grid {
          grid-template-columns: 1fr;
        }

        .hero-main h1 {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div class="panel hero-main">
          <div class="eyebrow">Debug Viewer</div>
          <h1>社会心理仿真调试页</h1>
          <p id="scenarioText">当前还没有快照。点击“开始仿真”后，后端才会启动一次新的推演。</p>
        </div>
        <div class="panel hero-side">
          <div class="actions">
            <button id="runBtn">开始仿真</button>
            <button class="secondary" id="refreshBtn">刷新快照</button>
          </div>
          <div class="links">
            <a href="/docs" target="_blank" rel="noreferrer">API 文档: http://localhost:8000/docs</a>
            <a href="/debug/viewer" target="_blank" rel="noreferrer">调试页: http://localhost:8000/debug/viewer</a>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <div class="progress-meta">
              <span id="progressText">尚未开始</span>
              <span id="progressPercent">0%</span>
            </div>
          </div>
          <div class="sub" id="statusText">等待后端响应</div>
        </div>
      </section>

      <section class="grid">
        <div class="panel card span-5">
          <div class="eyebrow">Frontend Params</div>
          <div class="form-grid">
            <div class="field"><label for="numAgents">num_agents</label><input id="numAgents" type="number" /></div>
            <div class="field"><label for="rounds">rounds</label><input id="rounds" type="number" /></div>
            <div class="field"><label for="seedPosts">seed_posts</label><input id="seedPosts" type="number" /></div>
            <div class="field"><label for="seed">seed</label><input id="seed" type="number" /></div>
            <div class="field"><label for="feedLimit">feed_limit</label><input id="feedLimit" type="number" /></div>
            <div class="field"><label for="mode">mode</label><select id="mode"></select></div>
            <div class="field"><label for="provider">llm_provider</label><select id="provider"></select></div>
            <div class="field checkbox"><input id="enableFallback" type="checkbox" /><label for="enableFallback">enable_fallback</label></div>
          </div>
          <div class="sub" style="margin-top: 12px" id="paramNotes">正在加载可选参数...</div>
        </div>

        <div class="panel card span-4">
          <div class="eyebrow">Rounds</div>
          <div class="stat" id="roundCount">-</div>
          <div class="sub">当前仿真轮次</div>
        </div>
        <div class="panel card span-4">
          <div class="eyebrow">Agents</div>
          <div class="stat" id="agentCount">-</div>
          <div class="sub">参与智能体数量</div>
        </div>
        <div class="panel card span-4">
          <div class="eyebrow">Posts</div>
          <div class="stat" id="postCount">-</div>
          <div class="sub">平台可见帖子总量</div>
        </div>

        <div class="panel card span-4">
          <div class="eyebrow">Agent Snapshot</div>
          <div class="list" id="agentList"><div class="loading">等待快照...</div></div>
        </div>

        <div class="panel card span-8">
          <div class="eyebrow">Round Timeline</div>
          <div class="timeline" id="timeline"><div class="loading">等待快照...</div></div>
        </div>

        <div class="panel card span-12">
          <div class="eyebrow">Raw Snapshot</div>
          <pre id="rawJson">{}</pre>
        </div>
      </section>
    </div>

    <script>
      const els = {
        scenarioText: document.getElementById("scenarioText"),
        statusText: document.getElementById("statusText"),
        roundCount: document.getElementById("roundCount"),
        agentCount: document.getElementById("agentCount"),
        postCount: document.getElementById("postCount"),
        agentList: document.getElementById("agentList"),
        timeline: document.getElementById("timeline"),
        rawJson: document.getElementById("rawJson"),
        whyText: document.getElementById("whyText"),
        paramNotes: document.getElementById("paramNotes"),
        runBtn: document.getElementById("runBtn"),
        refreshBtn: document.getElementById("refreshBtn"),
        progressFill: document.getElementById("progressFill"),
        progressText: document.getElementById("progressText"),
        progressPercent: document.getElementById("progressPercent"),
        numAgents: document.getElementById("numAgents"),
        rounds: document.getElementById("rounds"),
        seedPosts: document.getElementById("seedPosts"),
        seed: document.getElementById("seed"),
        feedLimit: document.getElementById("feedLimit"),
        mode: document.getElementById("mode"),
        provider: document.getElementById("provider"),
        enableFallback: document.getElementById("enableFallback"),
      };

      let activeJobId = null;
      let activePollTimer = null;

      function fmt(v) {
        return typeof v === "number" ? v.toFixed(3) : String(v ?? "-");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderAgents(agents) {
        if (!agents?.length) {
          els.agentList.innerHTML = '<div class="empty">暂无 agent 数据</div>';
          return;
        }

        els.agentList.innerHTML = agents
          .map((agent) => {
            const state = agent.state || {};
            const profile = agent.profile || {};
            return `
              <div class="agent">
                <strong>${escapeHtml(profile.name || "Agent")} <span class="sub">#${profile.agent_id ?? "-"}</span></strong>
                <div class="sub">${escapeHtml(profile.role || "-")} / ${escapeHtml(profile.ideology || "-")}</div>
                <div>
                  <span class="chip">satisfaction ${fmt(state.satisfaction)}</span>
                  <span class="chip">dopamine ${fmt(state.dopamine_level)}</span>
                  <span class="chip">epsilon ${fmt(state.epsilon)}</span>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function renderTimeline(history) {
        if (!history?.length) {
          els.timeline.innerHTML = '<div class="empty">暂无轮次历史</div>';
          return;
        }

        els.timeline.innerHTML = history
          .map((round) => {
            const results = Object.values(round.results || {});
            const blocks = results
              .map((entry) => {
                const profile = entry.profile || {};
                const state = entry.state || {};
                const decision = entry.decision || {};
                const behavior = entry.behavior_output || {};
                return `
                  <div class="result">
                    <strong>${escapeHtml(profile.name || "Agent")}</strong>
                    <div class="sub">${escapeHtml(decision.reason || "No decision reason")}</div>
                    <div class="meta">
                      <div><span class="sub">backend_action</span><br>${escapeHtml(decision.action || "-")}</div>
                      <div><span class="sub">suggested_action</span><br>${escapeHtml(decision.suggested_action || behavior.primary_action || "-")}</div>
                      <div><span class="sub">satisfaction</span><br>${fmt(state.satisfaction)}</div>
                      <div><span class="sub">dopamine</span><br>${fmt(state.dopamine_level)}</div>
                    </div>
                  </div>
                `;
              })
              .join("");
            return `<div class="round"><h3>Round ${round.round_index}</h3>${blocks}</div>`;
          })
          .join("");
      }

      function populateSelect(select, values, selected) {
        select.innerHTML = values.map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join("");
        select.value = selected;
      }

      function setProgress(progress, text) {
        const percent = Math.max(0, Math.min(100, Math.round((progress || 0) * 100)));
        els.progressFill.style.width = `${percent}%`;
        els.progressPercent.textContent = `${percent}%`;
        els.progressText.textContent = text || "等待中";
      }

      function currentRunPayload() {
        return {
          num_agents: Number(els.numAgents.value),
          rounds: Number(els.rounds.value),
          seed_posts: Number(els.seedPosts.value),
          seed: Number(els.seed.value),
          feed_limit: Number(els.feedLimit.value),
          mode: els.mode.value,
          llm_provider: els.provider.value,
          enable_fallback: els.enableFallback.checked,
        };
      }

      function renderSnapshot(data) {
        els.scenarioText.textContent = data.scenario_prompt || "暂无场景描述";
        els.roundCount.textContent = data.round_index ?? "-";
        els.agentCount.textContent = (data.agents || []).length;
        els.postCount.textContent = (data.platform?.posts || []).length;
        renderAgents(data.agents || []);
        renderTimeline(data.history || []);
        els.rawJson.textContent = JSON.stringify(data, null, 2);
        if (data._debug?.whyResultsAppearWithoutApiKey) {
          els.whyText.textContent = data._debug.whyResultsAppearWithoutApiKey;
        }
      }

      async function loadOptions() {
        const res = await fetch("/api/debug/options");
        const data = await res.json();
        const defaults = data.debug_run_defaults || {};

        els.numAgents.value = defaults.num_agents ?? 8;
        els.rounds.value = defaults.rounds ?? 4;
        els.seedPosts.value = defaults.seed_posts ?? 6;
        els.seed.value = defaults.seed ?? 42;
        els.feedLimit.value = defaults.feed_limit ?? 5;
        populateSelect(els.mode, data.allowed_modes || ["fallback", "moe"], defaults.mode || "fallback");
        populateSelect(els.provider, data.allowed_providers || ["ollama", "deepseek"], defaults.llm_provider || "ollama");
        els.enableFallback.checked = Boolean(defaults.enable_fallback ?? true);
        els.paramNotes.textContent =
          "这些参数已经预留给前端选择：" +
          ["num_agents", "rounds", "seed_posts", "seed", "feed_limit", "mode", "llm_provider", "enable_fallback"].join(", ");
      }

      async function loadStatus() {
        const res = await fetch("/api/debug/status");
        const data = await res.json();
        els.whyText.textContent = data.why_results_can_exist_without_api_key || "暂无说明";
      }

      async function loadSnapshot() {
        els.statusText.textContent = "正在加载快照...";
        try {
          const res = await fetch("/api/debug/snapshot");
          if (!res.ok) {
            const err = await res.json();
            els.statusText.textContent = err.detail || "暂无快照，请先运行样例。";
            els.scenarioText.textContent = "当前还没有快照。点击“开始仿真”后再查看结果。";
            els.agentList.innerHTML = '<div class="empty">暂无 agent 数据</div>';
            els.timeline.innerHTML = '<div class="empty">暂无轮次历史</div>';
            els.rawJson.textContent = "{}";
            return;
          }

          const data = await res.json();
          renderSnapshot(data);
          els.statusText.textContent = "已加载最新后端结果";
        } catch (err) {
          els.statusText.textContent = `加载失败: ${err}`;
        }
      }

      async function pollRunJob() {
        if (!activeJobId) {
          return;
        }

        try {
          const res = await fetch(`/api/debug/run-sample/${activeJobId}`);
          const data = await res.json();
          const progressTextParts = [data.message || data.stage || "运行中"];
          if (typeof data.completed_rounds === "number" && typeof data.total_rounds === "number") {
            progressTextParts.push(`(${data.completed_rounds}/${data.total_rounds})`);
          }
          setProgress(data.progress || 0, progressTextParts.join(" "));
          els.statusText.textContent = data.message || data.stage || "仿真运行中";

          if (data.status === "completed") {
            if (activePollTimer) {
              clearTimeout(activePollTimer);
              activePollTimer = null;
            }
            if (data.snapshot) {
              renderSnapshot(data.snapshot);
            } else {
              await loadSnapshot();
            }
            els.statusText.textContent = "后端仿真完成";
            els.runBtn.disabled = false;
            activeJobId = null;
            return;
          }

          if (data.status === "failed") {
            if (activePollTimer) {
              clearTimeout(activePollTimer);
              activePollTimer = null;
            }
            setProgress(data.progress || 0, data.error || "仿真失败");
            els.statusText.textContent = data.error || "仿真失败";
            els.runBtn.disabled = false;
            activeJobId = null;
            return;
          }

          activePollTimer = setTimeout(pollRunJob, 500);
        } catch (err) {
          els.statusText.textContent = `读取进度失败: ${err}`;
          els.runBtn.disabled = false;
          activeJobId = null;
        }
      }

      async function runSample() {
        els.statusText.textContent = "正在启动后端仿真...";
        els.runBtn.disabled = true;
        setProgress(0.02, "正在创建仿真任务");

        try {
          const res = await fetch("/api/debug/run-sample/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(currentRunPayload()),
          });
          const data = await res.json();
          activeJobId = data.job_id;
          els.statusText.textContent = "后端已经开始推演";
          pollRunJob();
        } catch (err) {
          els.statusText.textContent = `启动失败: ${err}`;
          setProgress(0, "启动失败");
          els.runBtn.disabled = false;
        }
      }

      els.runBtn.addEventListener("click", runSample);
      els.refreshBtn.addEventListener("click", loadSnapshot);

      Promise.all([loadOptions(), loadStatus()]).then(loadSnapshot);
    </script>
  </body>
</html>
