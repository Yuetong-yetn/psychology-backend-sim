<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backend Debug Viewer</title>
    <style>
      :root{
        --bg:#0d1117;
        --panel:#151b23;
        --panel-2:#1b2230;
        --line:#2a3444;
        --text:#edf2f7;
        --muted:#97a6ba;
        --accent:#f59e0b;
        --accent-2:#60a5fa;
        --good:#34d399;
        --warn:#f87171;
      }
      *{box-sizing:border-box}
      body{
        margin:0;
        background:
          radial-gradient(circle at top left, rgba(245,158,11,.18), transparent 28%),
          radial-gradient(circle at top right, rgba(96,165,250,.14), transparent 24%),
          linear-gradient(180deg, #0d1117 0%, #0b0f14 100%);
        color:var(--text);
        font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      }
      .shell{max-width:1280px;margin:0 auto;padding:28px 20px 56px}
      .hero{
        display:grid;gap:18px;
        grid-template-columns:1.6fr .9fr;
        align-items:stretch;margin-bottom:20px;
      }
      .panel{
        background:linear-gradient(180deg, rgba(21,27,35,.96), rgba(17,22,29,.96));
        border:1px solid var(--line);
        border-radius:22px;
        box-shadow:0 20px 60px rgba(0,0,0,.25);
      }
      .hero-main{padding:26px}
      .hero-main h1{margin:0 0 10px;font-size:40px;letter-spacing:.02em}
      .hero-main p{margin:0;color:var(--muted);line-height:1.7}
      .hero-side{padding:22px;display:grid;gap:14px}
      .actions{display:flex;flex-wrap:wrap;gap:10px}
      button{
        border:0;border-radius:999px;padding:11px 16px;font-weight:700;cursor:pointer;
        background:linear-gradient(135deg,var(--accent),#fb7185);color:#121212;
      }
      button.secondary{background:#263142;color:var(--text)}
      .links a{display:block;color:#cfe4ff;text-decoration:none;margin:8px 0}
      .grid{
        display:grid;gap:18px;
        grid-template-columns:repeat(12,1fr);
      }
      .span-4{grid-column:span 4}
      .span-6{grid-column:span 6}
      .span-8{grid-column:span 8}
      .span-12{grid-column:span 12}
      .card{padding:20px}
      .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:10px}
      .stat{font-size:34px;font-weight:800}
      .sub{color:var(--muted);font-size:14px}
      .list{display:grid;gap:12px}
      .agent{
        padding:14px;border-radius:16px;background:var(--panel-2);border:1px solid rgba(255,255,255,.05)
      }
      .agent strong{display:block;margin-bottom:4px}
      .chip{
        display:inline-block;padding:4px 10px;border-radius:999px;
        font-size:12px;background:#243044;color:#dce8ff;margin-right:6px;margin-top:6px
      }
      .timeline{display:grid;gap:14px}
      .round{
        border:1px solid rgba(255,255,255,.06);
        border-radius:18px;padding:16px;background:#111722
      }
      .round h3{margin:0 0 10px}
      .result{
        margin-top:12px;padding:12px;border-radius:14px;background:#192230
      }
      .meta{
        display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:10px
      }
      .meta div{
        padding:10px 12px;border-radius:14px;background:#0f1520;border:1px solid rgba(255,255,255,.04)
      }
      .loading,.empty{padding:36px;text-align:center;color:var(--muted)}
      pre{
        margin:0;white-space:pre-wrap;word-break:break-word;
        font-family:Consolas,monospace;font-size:12px;color:#d8e3f0
      }
      @media (max-width: 980px){
        .hero{grid-template-columns:1fr}
        .span-4,.span-6,.span-8,.span-12{grid-column:span 12}
        .meta{grid-template-columns:repeat(2,minmax(0,1fr))}
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div class="panel hero-main">
          <div class="eyebrow">Debug Viewer</div>
          <h1>社交心理仿真可视化</h1>
          <p id="scenarioText">正在加载后端快照...</p>
        </div>
        <div class="panel hero-side">
          <div class="actions">
            <button id="runBtn">运行示例</button>
            <button class="secondary" id="refreshBtn">刷新快照</button>
          </div>
          <div class="links">
            <a href="/docs" target="_blank" rel="noreferrer">API 文档: http://localhost:8000/docs</a>
            <a href="/debug/viewer" target="_blank" rel="noreferrer">调试页: http://localhost:8000/debug/viewer</a>
          </div>
          <div class="sub" id="statusText">等待后端响应</div>
        </div>
      </section>

      <section class="grid">
        <div class="panel card span-4">
          <div class="eyebrow">Rounds</div>
          <div class="stat" id="roundCount">-</div>
          <div class="sub">当前仿真轮次</div>
        </div>
        <div class="panel card span-4">
          <div class="eyebrow">Agents</div>
          <div class="stat" id="agentCount">-</div>
          <div class="sub">参与智能体数量</div>
        </div>
        <div class="panel card span-4">
          <div class="eyebrow">Posts</div>
          <div class="stat" id="postCount">-</div>
          <div class="sub">平台可见帖子总量</div>
        </div>

        <div class="panel card span-4">
          <div class="eyebrow">Agent Snapshot</div>
          <div class="list" id="agentList">
            <div class="loading">正在加载 agent 状态...</div>
          </div>
        </div>

        <div class="panel card span-8">
          <div class="eyebrow">Round Timeline</div>
          <div class="timeline" id="timeline">
            <div class="loading">正在加载 timeline...</div>
          </div>
        </div>

        <div class="panel card span-12">
          <div class="eyebrow">Raw Snapshot</div>
          <pre id="rawJson">{}</pre>
        </div>
      </section>
    </div>

    <script>
      const scenarioText = document.getElementById("scenarioText");
      const statusText = document.getElementById("statusText");
      const roundCount = document.getElementById("roundCount");
      const agentCount = document.getElementById("agentCount");
      const postCount = document.getElementById("postCount");
      const agentList = document.getElementById("agentList");
      const timeline = document.getElementById("timeline");
      const rawJson = document.getElementById("rawJson");
      const runBtn = document.getElementById("runBtn");
      const refreshBtn = document.getElementById("refreshBtn");

      function fmt(v){
        return typeof v === "number" ? v.toFixed(3) : String(v ?? "-");
      }

      function renderAgents(agents){
        if(!agents?.length){
          agentList.innerHTML = '<div class="empty">暂无 agent 数据</div>';
          return;
        }
        agentList.innerHTML = agents.map(agent => {
          const state = agent.state || {};
          const profile = agent.profile || {};
          return `
            <div class="agent">
              <strong>${profile.name || "Agent"} <span class="sub">#${profile.agent_id ?? "-"}</span></strong>
              <div class="sub">${profile.role || "-"} / ${profile.ideology || "-"}</div>
              <div>
                <span class="chip">satisfaction ${fmt(state.satisfaction)}</span>
                <span class="chip">DA ${fmt(state.dopamine_level)}</span>
                <span class="chip">epsilon ${fmt(state.epsilon)}</span>
                <span class="chip">action ${(state.intentions && Object.keys(state.intentions).length) ? 'active' : 'n/a'}</span>
              </div>
            </div>
          `;
        }).join("");
      }

      function renderTimeline(history){
        if(!history?.length){
          timeline.innerHTML = '<div class="empty">暂无轮次历史</div>';
          return;
        }
        timeline.innerHTML = history.map(round => {
          const results = Object.values(round.results || {});
          const blocks = results.map(entry => {
            const profile = entry.profile || {};
            const state = entry.state || {};
            const decision = entry.decision || {};
            const behavior = entry.behavior_output || {};
            return `
              <div class="result">
                <strong>${profile.name || "Agent"}</strong>
                <div class="sub">${decision.reason || "No decision reason"}</div>
                <div class="meta">
                  <div><span class="sub">backend_action</span><br>${decision.action || "-"}</div>
                  <div><span class="sub">suggested_action</span><br>${decision.suggested_action || behavior.primary_action || "-"}</div>
                  <div><span class="sub">satisfaction</span><br>${fmt(state.satisfaction)}</div>
                  <div><span class="sub">dopamine</span><br>${fmt(state.dopamine_level)}</div>
                </div>
              </div>
            `;
          }).join("");
          return `
            <div class="round">
              <h3>Round ${round.round_index}</h3>
              ${blocks}
            </div>
          `;
        }).join("");
      }

      async function loadSnapshot(){
        statusText.textContent = "正在加载快照...";
        const res = await fetch("/api/debug/snapshot");
        const data = await res.json();
        scenarioText.textContent = data.scenario_prompt || "暂无场景描述";
        roundCount.textContent = data.round_index ?? "-";
        agentCount.textContent = (data.agents || []).length;
        postCount.textContent = (data.platform?.posts || []).length;
        renderAgents(data.agents || []);
        renderTimeline(data.history || []);
        rawJson.textContent = JSON.stringify(data, null, 2);
        statusText.textContent = "已加载最新后端结果";
      }

      async function runSample(){
        statusText.textContent = "正在运行后端示例...";
        runBtn.disabled = true;
        try{
          const res = await fetch("/api/debug/run-sample", {method:"POST"});
          const data = await res.json();
          scenarioText.textContent = data.scenario_prompt || "暂无场景描述";
          roundCount.textContent = data.round_index ?? "-";
          agentCount.textContent = (data.agents || []).length;
          postCount.textContent = (data.platform?.posts || []).length;
          renderAgents(data.agents || []);
          renderTimeline(data.history || []);
          rawJson.textContent = JSON.stringify(data, null, 2);
          statusText.textContent = "后端示例运行完成";
        }catch(err){
          statusText.textContent = "运行失败: " + err;
        }finally{
          runBtn.disabled = false;
        }
      }

      runBtn.addEventListener("click", runSample);
      refreshBtn.addEventListener("click", loadSnapshot);
      loadSnapshot();
    </script>
  </body>
  </html>
